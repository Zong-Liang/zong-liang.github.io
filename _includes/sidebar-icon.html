{%- assign icon_name = include.name | downcase -%}
<span class="sidebar-svg-icon{% if include.variant %} sidebar-svg-icon--{{ include.variant }}{% endif %}" aria-hidden="true">
  {% case icon_name %}
    {% when 'home' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3.5 10.5 12 4l8.5 6.5" />
        <path d="M5.5 10v9a1 1 0 0 0 1 1h4.5v-5.5h2V20h4.5a1 1 0 0 0 1-1v-9" />
      </svg>
    {% when 'categories' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 7.5h14" />
        <path d="M8 12h11" />
        <path d="M5 16.5h14" />
      </svg>
    {% when 'tags' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H6.5A1.5 1.5 0 0 0 5 5.5V10l7.5 7.5a2.1 2.1 0 0 0 3 0l2-2a2.1 2.1 0 0 0 0-3L10 5z" />
        <circle cx="8.2" cy="8.2" r="1.1" fill="currentColor" stroke="none" />
      </svg>
    {% when 'archives' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6.5" width="16" height="12.5" rx="2" />
        <path d="M4 9.5h16" />
        <path d="M9.25 4.75h5.5" />
      </svg>
    {% when 'about' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5" />
        <path d="M12 10.4v5" />
        <circle cx="12" cy="7.9" r="0.85" fill="currentColor" stroke="none" />
      </svg>
    {% when 'theme' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3.5a8.5 8.5 0 1 0 0 17z" />
        <path d="M12 3.5a8.5 8.5 0 0 1 0 17" opacity="0.45" />
      </svg>
    {% when 'github' %}
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 3.8a8.6 8.6 0 0 0-2.72 16.76c.43.08.58-.19.58-.42v-1.5c-2.36.52-2.86-1-2.86-1-.39-.98-.94-1.24-.94-1.24-.77-.53.06-.52.06-.52.85.06 1.3.88 1.3.88.76 1.3 1.98.92 2.46.7.08-.55.3-.92.54-1.13-1.89-.21-3.88-.94-3.88-4.18 0-.92.33-1.67.87-2.26-.09-.22-.38-1.09.08-2.27 0 0 .71-.23 2.34.86a8.1 8.1 0 0 1 4.26 0c1.63-1.09 2.34-.86 2.34-.86.46 1.18.17 2.05.08 2.27.54.59.87 1.34.87 2.26 0 3.25-2 3.96-3.89 4.17.31.27.58.8.58 1.62v2.4c0 .23.16.5.59.42A8.6 8.6 0 0 0 12 3.8Z"/>
      </svg>
    {% when 'email' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6.5" width="16" height="11" rx="2" />
        <path d="m5.5 8 6.5 5 6.5-5" />
      </svg>
    {% when 'rss' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 17.5a1.2 1.2 0 1 0 0 2.4 1.2 1.2 0 0 0 0-2.4Z" fill="currentColor" stroke="none"/>
        <path d="M5.5 11.5a7 7 0 0 1 7 7" />
        <path d="M5.5 6a12.5 12.5 0 0 1 12.5 12.5" />
      </svg>
    {% else %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 15 15 9" />
        <path d="M10 7h7v7" />
        <path d="M7 10v7h7" />
      </svg>
  {% endcase %}
</span>

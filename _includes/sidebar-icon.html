{%- assign icon_name = include.name | downcase -%}
<span class="sidebar-svg-icon{% if include.variant %} sidebar-svg-icon--{{ include.variant }}{% endif %}" aria-hidden="true">
  {% case icon_name %}
    {% when 'home' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="m4 11 8-7 8 7" />
        <path d="M6 10.5V20h5v-5h2v5h5v-9.5" />
      </svg>
    {% when 'categories' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 7h16" />
        <path d="M7 12h13" />
        <path d="M4 17h16" />
      </svg>
    {% when 'tags' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.6 13.4 10.6 3.4A2 2 0 0 0 9.2 3H5a2 2 0 0 0-2 2v4.2a2 2 0 0 0 .4 1.4l10 10a2 2 0 0 0 2.8 0l4.4-4.4a2 2 0 0 0 0-2.8Z" />
        <circle cx="7.5" cy="7.5" r="1.15" fill="currentColor" stroke="none" />
      </svg>
    {% when 'archives' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="6.5" width="17" height="13" rx="2.2" />
        <path d="M3.5 10h17" />
        <path d="M9 4.75h6" />
      </svg>
    {% when 'about' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5" />
        <path d="M12 10.75V16" />
        <circle cx="12" cy="8" r="1" fill="currentColor" stroke="none" />
      </svg>
    {% when 'theme' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3.5a8.5 8.5 0 1 0 0 17" />
        <path d="M12 3.5a8.5 8.5 0 0 1 0 17" opacity="0.45" />
      </svg>
    {% when 'github' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 19c-4 1.2-4-2-5.5-2.4" />
        <path d="M15 22v-2.9a2.4 2.4 0 0 0-.7-1.9c3.1-.35 6.2-1.5 6.2-6.6a5.2 5.2 0 0 0-1.4-3.6 4.8 4.8 0 0 0-.08-3.57s-1.12-.36-3.68 1.36a12.6 12.6 0 0 0-6.7 0C6.1 3.07 5 3.43 5 3.43a4.8 4.8 0 0 0-.08 3.57A5.2 5.2 0 0 0 3.5 10.6c0 5.1 3.1 6.25 6.2 6.6a2.4 2.4 0 0 0-.7 1.9V22" />
      </svg>
    {% when 'email' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="6.5" width="17" height="11.5" rx="2.2" />
        <path d="m4.75 8.1 7.25 5.5 7.25-5.5" />
      </svg>
    {% when 'rss' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6.2" cy="17.8" r="1.2" fill="currentColor" stroke="none" />
        <path d="M5.5 11.9a6.6 6.6 0 0 1 6.6 6.6" />
        <path d="M5.5 6.2a12.3 12.3 0 0 1 12.3 12.3" />
      </svg>
    {% else %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 15 15 9" />
        <path d="M10 7h7v7" />
        <path d="M7 10v7h7" />
      </svg>
  {% endcase %}
</span>
